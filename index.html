<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reports – CLDP</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #f7f7f5;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 64px 24px;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
  }

  .header {
    margin-bottom: 48px;
  }

  .header-eyebrow {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 10px;
  }

  .header h1 {
    font-size: 32px;
    font-weight: 600;
    color: #1a1a1a;
    line-height: 1.2;
  }

  .header p {
    margin-top: 10px;
    font-size: 15px;
    color: #666;
    line-height: 1.6;
  }

  .divider {
    border: none;
    border-top: 1px solid #e0e0e0;
    margin-bottom: 40px;
  }

  .state-section {
    display: grid;
    grid-template-columns: 120px 1fr;
    gap: 0 32px;
    margin-bottom: 40px;
    padding-bottom: 40px;
    border-bottom: 1px solid #e8e8e8;
  }

  .state-section:last-child {
    border-bottom: none;
    margin-bottom: 0;
  }

  .state-label {
    font-size: 13px;
    font-weight: 600;
    color: #1a1a1a;
    padding-top: 3px;
  }

  .state-cards {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
  }

  .empty {
    font-size: 13px;
    color: #bbb;
    padding-top: 3px;
  }

  .card {
    background: #fff;
    border: 1px solid #e8e8e8;
    border-radius: 8px;
    padding: 18px 20px 16px;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    gap: 8px;
    width: 240px;
    transition: box-shadow 0.15s ease, border-color 0.15s ease;
  }

  .card:hover {
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    border-color: #ccc;
  }

  .card-title {
    font-size: 13px;
    font-weight: 600;
    color: #1a1a1a;
    line-height: 1.4;
  }

  .card-meta {
    font-size: 12px;
    color: #999;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }

  .tag {
    background: #f0f6f2;
    color: #3d6b4f;
    border-radius: 4px;
    padding: 2px 7px;
    font-size: 11px;
    font-weight: 500;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-eyebrow">Janaagraha · CLDP</div>
    <h1>Reports</h1>
    <p>WhatsApp group engagement analyses by state.</p>
  </div>

  <hr class="divider">

  <div class="state-section">
    <div class="state-label">Karnataka</div>
    <div class="state-cards">
      <a class="card" href="CLDP_KA_Engagement_Report.html">
        <div class="card-title">Engagement Report – CLDP Karnataka</div>
        <div class="card-meta">
          <span>Nov 2025 – Apr 2026</span>
          <span class="tag">WhatsApp Analysis</span>
        </div>
      </a>
    </div>
  </div>

  <div class="state-section">
    <div class="state-label">Uttar Pradesh</div>
    <div class="state-cards">
      <span class="empty">No reports yet</span>
    </div>
  </div>

</div>
</body>
</html>
